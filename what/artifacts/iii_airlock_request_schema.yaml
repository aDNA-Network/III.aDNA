# III.aDNA Airlock Cross-Vault Request Schema
#
# Machine-readable, validator-friendly schema for cross-vault request memo
# frontmatter under III.aDNA Airlock Standard v0.2.0 §4.3.
#
# Authoring mission : MC-2 (campaign_c_airlock_standard, P1, 2026-05-08)
# Spec reference    : what/artifacts/iii_airlock_standard_spec.md §4.3
# Worked example    : ~/aDNA/CanvasForge.aDNA/who/coordination/coord_2026_05_08_videoforge_requests_carly_herb_deck.md
#
# When prose and schema disagree, the spec prose is normative. This file is the
# mechanical contract; the spec is the human contract.
#
# Validation pattern:
#   import yaml, jsonschema
#   schema = yaml.safe_load(open('iii_airlock_request_schema.yaml'))
#   jsonschema.Draft202012Validator.check_schema(schema)        # schema validity
#   jsonschema.validate(memo_frontmatter, schema)                # memo validity
#
# Worked-example conformance (recorded at MC-2 close):
#   The CanvasForge worked example was authored against the v0.1.0 coord-memo
#   fallback (see spec §5.2). Two known non-conformances vs this v0.2 schema:
#     1. Top-level `type: coordination` (should be `cross_vault_request`).
#     2. `spec_path` / `output_sink` are body-promoted (under § "What CanvasForge
#        Receives"), not in the `artifact_request` frontmatter object.
#   Both are expected per spec §5.2 additive-deltas clause; the worked example
#   demonstrates the *shape* and is not a v0.2 conformance test case. Any new
#   v0.2-era memo following spec §4.3 frontmatter passes this schema.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://lattice-protocol.dev/schemas/airlock-request/v0.2.0
title: III.aDNA Airlock Cross-Vault Request Schema
description: |
  Frontmatter contract for cross-vault request memos under III.aDNA Airlock
  Standard v0.2.0 §4.3. A conformant memo lives at the receiving vault's
  `who/coordination/` directory with filename pattern
  `coord_<YYYY_MM_DD>_<requesting_vault>_requests_<artifact>.md`; its
  frontmatter conforms to this schema, and its body conforms to the 10-section
  canonical shape captured in `x-body-sections` (markdown body shape; not
  mechanically validated by this schema).

  Required minimum (Gap 3 core, per spec §4.3): top-level `type` set to
  `cross_vault_request` and `artifact_request` containing `spec_path` and
  `output_sink`. Every other property is optional and shaped by the work being
  commissioned.

  Open-shape rule: this schema sets `additionalProperties: true` at root and on
  `artifact_request` so consumer vaults can extend with domain-specific fields
  (e.g. VideoForge ADR-005 `feedback_channel`) without a schema bump. The
  closed-shape sub-objects (`constraints`, `secrets_handled`) use
  `additionalProperties: false` to prevent typo drift on substrate-critical
  contracts.

type: object
required:
  - type
  - artifact_request
additionalProperties: true

properties:

  type:
    description: |
      Discriminator for the memo type. MUST be `cross_vault_request`. Any other
      value indicates the memo is not a v0.2 cross-vault request and this
      schema does not apply.
    const: cross_vault_request

  title:
    description: Short human-readable title; appears in receiver inventories.
    type: string

  status:
    description: |
      Lifecycle state per spec §4.1. Default `open` at filing; receiver advances
      through the state set during acceptance, rendering, ship, and close.
    type: string
    enum:
      - open        # filed by requester; awaiting receiver pickup
      - accepted    # receiver validated inputs and assigned audit_id
      - rendering   # receiver pipeline executing
      - shipped     # artifacts written to output_sink; awaiting requester ack
      - closed      # requester acknowledged; both sides moved memos to history
      - rejected    # receiver declined (capacity, scope, or lattice mismatch)
      - cancelled   # requester withdrew before pickup
      - queued      # receiver accepted but over-capacity; queue position in body
    default: open

  direction:
    description: |
      Human-readable direction marker, e.g. `"inbound (CanvasForge.aDNA receives)"`.
      Convention only; not mechanically constrained.
    type: string

  requesting_vault:
    description: aDNA vault name of the requester (e.g. `VideoForge.aDNA`).
    type: string
    pattern: '^[A-Za-z][A-Za-z0-9_-]*\.aDNA$'

  receiving_vault:
    description: aDNA vault name of the receiver (e.g. `CanvasForge.aDNA`).
    type: string
    pattern: '^[A-Za-z][A-Za-z0-9_-]*\.aDNA$'

  requesting_persona:
    description: Persona name of the requesting agent (e.g. `iris`, `argus_panoptes`).
    type: string

  receiving_persona:
    description: Persona name of the receiving agent (e.g. `hermes`).
    type: string

  requesting_agent:
    description: Agent identifier filing the request (e.g. `agent_stanley`).
    type: string

  created:
    description: ISO 8601 calendar date the memo was filed.
    type: string
    format: date

  updated:
    description: ISO 8601 calendar date of last edit.
    type: string
    format: date

  priority:
    description: |
      Operational priority. Affects handshake-profile selection: a request
      marked `high` or `urgent` MUST receive a full handshake (§4.2) rather
      than the lightweight `open → shipped → closed` path.
    type: string
    enum: [low, medium, high, urgent]
    default: low

  deadline:
    description: |
      Recommended forms: an ISO 8601 date-time, an ISO 8601 calendar date, or
      the literal `no_calendar_urgency`. Open string accepted to permit
      human-readable forms (e.g. "pre-Phase-6-close (weeks-of-flexibility)")
      that the worked example exercises; receivers SHOULD prefer machine-
      parseable forms when a calendar deadline applies.
    type: string

  audit_id:
    description: |
      Receiver-populated audit identifier. Begins as `pending` at filing;
      receiver replaces with a UUID v4 (or vault-local session id) on
      acceptance per spec §4.1 step 2. Open string to accommodate vault-local
      audit conventions.
    type: string
    default: pending

  artifact_request:
    description: |
      The work being commissioned. `spec_path` and `output_sink` are required
      per spec §4.3; both MUST resolve on disk at receiver-side validation
      (§4.1 step 1). Other sub-properties are optional.
    type: object
    required:
      - spec_path
      - output_sink
    additionalProperties: true
    properties:
      type:
        description: |
          Artifact-kind discriminator. Open string by design: known values are
          documented in `examples` for inventory and tooling, but new kinds
          (e.g. `slides`, `notebook`, `dataset_diff`) can be exercised before
          a schema bump. When a new kind is exercised twice in production,
          propose adding to the canonical examples via a v0.X bump.
        type: string
        minLength: 1
        examples: [deck, comic, video, website, review, dataset]
      spec_path:
        description: |
          Path to the build / review / commission specification on disk. MUST
          resolve at receiver-side validation; relative paths are resolved
          against the requester vault root.
        type: string
        minLength: 1
      output_sink:
        description: |
          Directory or file path where the receiver writes the deliverable.
          MUST resolve at receiver-side validation.
        type: string
        minLength: 1
      voice_mapping:
        description: |
          Path to a voice-register mapping YAML (e.g. CanvasForge VR1-VR5,
          VideoForge R1-R7). Optional; required only when the receiver pipeline
          gates on voice register.
        type: string
      lattice_path:
        description: |
          Path to the receiver-side lattice file invoked for this commission.
          Optional; receivers MAY infer from `artifact_request.type`.
        type: string
      quality_threshold:
        description: |
          Minimum quality score (e.g. composite voice + density + invariance)
          for the receiver to flip `shipped`. 0.0 — 1.0.
        type: number
        minimum: 0.0
        maximum: 1.0
      forbidden_registers:
        description: |
          Voice / register codes the receiver MUST auto-fail on. Treated as a
          hard gate even when `quality_threshold` is otherwise satisfied.
        type: array
        items:
          type: string

  constraints:
    description: |
      Operational constraints. Closed shape: every constraint the schema
      recognizes is enumerated below; new constraints require a schema bump.
    type: object
    additionalProperties: false
    properties:
      max_revisions:
        description: Maximum revision passes the receiver may run before requester re-ack.
        type: integer
        minimum: 0
      human_gate_required:
        description: |
          When true, the receiver MUST pause before final ship for human
          approval; flips `rendering` → `shipped` only after explicit gate.
        type: boolean
      budget_ceiling_usd:
        description: |
          Hard ceiling on receiver-side compute / API spend for this commission.
          Receiver MUST reject (`status: rejected`, reason `budget_ceiling_exceeded`)
          if estimated cost exceeds the ceiling at validation time.
        type: number
        minimum: 0.0

  secrets_handled:
    description: |
      Cross-vault secret delegation surface per spec §4.4. Closed shape:
      receivers MUST verify presence of every name in `needed` at acceptance
      time (spec §4.4 receiver-side preflight contract step 1) and MUST
      flip `status: rejected` with reason `missing_secret: <name>` if any
      named secret is absent. Receivers MUST NOT log secret values; names-only
      audit per §4.4 step 3.
    type: object
    additionalProperties: false
    properties:
      needed:
        description: |
          Names (env-var style) of secrets the receiver pipeline requires for
          this commission. Verified at acceptance; missing → reject.
        type: array
        items:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
      passthrough:
        description: |
          Subset of `needed` whose values cross the vault boundary as env-vars
          provided by the requester at request-filing time. Prefer `not_passed`
          where the receiver can provision independently (spec §4.4 requester
          contract step 1).
        type: array
        items:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
      not_passed:
        description: |
          One-line human-readable statement of secrets the requester is NOT
          transmitting (receiver provisions independently). Documentation,
          not a suppression list.
        type: string

  idempotency_key:
    description: |
      Receiver-side dedup key per spec §4.5. When present and `force_new` is
      false (default), the receiver MUST search active + last-30-day archive
      for matching key from same `requesting_vault`; on match, reply with
      `status: duplicate_of: <existing_memo_path>` and link prior `audit_id`,
      and the new memo flips `status: cancelled`.

      Recommended convention: `<requesting_vault_short>_<artifact_kind>_<version_or_iteration>`
      (e.g. `videoforge_carly_herb_deck_v1`).
    type: string
    minLength: 1

  force_new:
    description: |
      Override flag: when true, receiver opens a fresh session even if
      `idempotency_key` matches a prior memo. The duplicate is logged but
      not blocked. Requester opts in deliberately.
    type: boolean
    default: false

  tags:
    description: Free-form tags for inventory and search.
    type: array
    items:
      type: string

# ---------------------------------------------------------------------------
# Schema extensions (x-* keys; ignored by validators per JSON Schema 2020-12)
# ---------------------------------------------------------------------------

x-body-sections:
  description: |
    Canonical 10-section markdown body shape per spec §4.3. Order is normative;
    additional sections (e.g. `risk_register`) MAY appear AFTER section 10 but
    not interleaved. Body shape is markdown and not mechanically validated by
    this schema; future tooling could lint section headers against this list.
  required_order:
    - tldr                                    # 1. ≤ 3 sentences; what / by whom / urgency
    - request_context                         # 2. why; upstream campaign or mission driving the ask
    - what_receiving_vault_receives           # 3. file-by-file enumeration of inputs
    - what_receiving_vault_does_not_receive   # 4. explicit non-deliveries
    - constraints_and_notes                   # 5. operational + voice + design rules
    - acceptance_protocol                     # 6. concrete steps the receiver follows
    - rollback_or_cancel                      # 7. failure handling, partial-failure, cancel paths
    - why_this_memo                           # 8. rationale for using the request pattern
    - cross_references                        # 9. ADRs, charters, sibling memos, worked examples
    - status_log                              # 10. table updated through lifecycle (date | status | note)

x-lifecycle-transitions:
  description: |
    Valid status transitions per spec §4.1. Receiver-side actions advance the
    state; requester-side actions only at `cancelled` (before pickup) and at
    `closed` (acknowledging shipped artifacts).
  edges:
    - {from: open,       to: accepted,  actor: receiver, trigger: validation_passed}
    - {from: open,       to: rejected,  actor: receiver, trigger: validation_failed_or_decline}
    - {from: open,       to: cancelled, actor: requester, trigger: withdraw_before_pickup}
    - {from: accepted,   to: rendering, actor: receiver, trigger: pipeline_started}
    - {from: accepted,   to: queued,    actor: receiver, trigger: over_capacity}
    - {from: queued,     to: rendering, actor: receiver, trigger: capacity_freed}
    - {from: rendering,  to: shipped,   actor: receiver, trigger: artifacts_written}
    - {from: shipped,    to: closed,    actor: requester, trigger: deliverable_acknowledged}

x-handshake-profiles:
  description: |
    Profile selection per spec §4.2. Lightweight is the default for trivial
    2-forge ad-hoc requests; full is required when either vault is in active
    rendering / serving mode or when calendar deadlines apply.
  lightweight:
    states_used: [open, shipped, closed]
    when: occasional ad-hoc requests with no calendar urgency
  full:
    states_used: [open, accepted, rendering, shipped, closed, rejected, cancelled, queued]
    when: active rendering or calendar deadlines apply; required when priority is high or urgent
    acceptance_reply_must_carry: [status, audit_id, eta, reserved_capacity]

x-required-minimum:
  description: |
    Smallest valid memo per spec §4.3. Anything in this example, plus open or
    receiver-set defaults for the rest, conforms.
  example:
    type: cross_vault_request
    artifact_request:
      spec_path: requesting_vault/what/specs/example_spec.md
      output_sink: requesting_vault/output/

x-worked-example:
  path: ~/aDNA/CanvasForge.aDNA/who/coordination/coord_2026_05_08_videoforge_requests_carly_herb_deck.md
  conformance: non_conformant_by_design
  reason: |
    Authored against v0.1.0 coord-memo fallback (predates v0.2). Two known
    deltas: top-level `type: coordination` instead of `cross_vault_request`;
    `spec_path` and `output_sink` body-promoted instead of nested under
    frontmatter `artifact_request`. Spec §5.2 marks both as additive deltas;
    the memo is evidence of *shape* and not a v0.2 conformance test case.

x-spec-cross-references:
  spec_section_4_1_initiation:        what/artifacts/iii_airlock_standard_spec.md §4.1
  spec_section_4_2_handshake:         what/artifacts/iii_airlock_standard_spec.md §4.2
  spec_section_4_3_payload:           what/artifacts/iii_airlock_standard_spec.md §4.3
  spec_section_4_4_secrets:           what/artifacts/iii_airlock_standard_spec.md §4.4
  spec_section_4_5_idempotency:       what/artifacts/iii_airlock_standard_spec.md §4.5
  spec_section_6_versioning:          what/artifacts/iii_airlock_standard_spec.md §6
  adr_002_federation_contract:        what/decisions/adr_002_consumer_federation_contract.md
  campaign:                           how/campaigns/campaign_c_airlock_standard/campaign_c_airlock_standard.md
